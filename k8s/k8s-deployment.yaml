apiVersion: apps/v1
kind: Deployment
metadata:
  name: bonos-service
  namespace: vidalcasino
  labels:
    app: bonos-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bonos-service
  template:
    metadata:
      labels:
        app: bonos-service
    spec:
      containers:
      - name: bonos
        image: 123456789012.dkr.ecr.us-east-1.amazonaws.com/bonos-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8004
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        env:
        - name: PORT
          value: "8004"
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: casino-secrets
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: casino-secrets
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: casino-secrets
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: casino-secrets
              key: JWT_SECRET
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8004
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /livez
            port: 8004
          initialDelaySeconds: 10
          periodSeconds: 15
          timeoutSeconds: 2
          failureThreshold: 3